version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  mongodb:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "27017:27017"

  pg-service:
    build: ./backend/inventory-order-service
    ports:
      - "${INVENTORY_SERVICE_PORT}:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    # readiness probe: the service answers /health only after migrations have run
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  mongo-service:
    build: ./backend/catalog-analytics-service
    ports:
      - "${CATALOG_SERVICE_PORT}:3002"
    environment:
      - PORT=3002
      - MONGO_URI=${MONGO_URI}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    depends_on:
      mongodb:
        condition: service_healthy

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "${API_GATEWAY_PORT}:3000"
    environment:
      - PORT=3000
      # service discovery via env so the gateway is decoupled from container names
      - INVENTORY_SERVICE_URL=http://pg-service:3001
      - CATALOG_SERVICE_URL=http://mongo-service:3002
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    # gateway proxies to both microservices, so it cannot start before they are ready
    depends_on:
      pg-service:
        condition: service_healthy
      mongo-service:
        condition: service_healthy

  # one-shot seeder: runs after gateway is healthy, populates products, then exits
  # ensures `docker compose up` requires zero manual steps
  seeder:
    build: ./backend/api-gateway
    command: ["node", "seed-products.js"]
    environment:
      - SEED_GATEWAY_URL=http://api-gateway:3000
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: "no"

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      api-gateway:
        condition: service_healthy
