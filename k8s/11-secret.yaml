# sensitive configuration: database passwords and full connection strings
# IMPORTANT: the values below are dev placeholders committed only so that
# `kubectl apply -k .` works out of the box on a local kind cluster.
# in production these are created via `kubectl create secret generic aura-secret
# --from-literal=POSTGRES_PASSWORD=... --from-literal=MONGO_PASSWORD=...`
# and never committed to git.
apiVersion: v1
kind: Secret
metadata:
  name: aura-secret
  namespace: aura
type: Opaque
# stringData lets us declare plain text values; kubernetes base64-encodes them on apply
stringData:
  # postgres credentials consumed by the postgres statefulset and pg-service
  POSTGRES_PASSWORD: "dev_password_change_me"

  # mongo root password consumed by the mongo statefulset
  MONGO_PASSWORD: "dev_password_change_me"

  # full database urls; kept here (not in ConfigMap) because they contain passwords
  # postgres-0.postgres is the stable dns name produced by the headless service + statefulset
  DATABASE_URL: "postgresql://user:dev_password_change_me@postgres-0.postgres:5432/ecommerce_db"
  MONGO_URI: "mongodb://admin:dev_password_change_me@mongodb-0.mongodb:27017/ecommerce_db?authSource=admin"
