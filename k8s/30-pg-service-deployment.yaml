# pg-service runs as a stateless deployment behind a ClusterIP service.
# the database state lives in the postgres statefulset, not here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-service
  namespace: aura
spec:
  # 2 replicas satisfies the "minimum 2 replicas for the backend" requirement
  replicas: 2
  # rolling update is the kubernetes default but we declare it explicitly
  # maxSurge=1 + maxUnavailable=0 means we never go below the desired replica count
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pg-service
  template:
    metadata:
      labels:
        app: pg-service
      # annotations consumed by prometheus to discover this pod as a scrape target
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      # pod-level security context: every container in this pod runs as a non-root user
      securityContext:
        runAsNonRoot: true
        # uid 100 matches the "app" user we created in the pg-service Dockerfile
        runAsUser: 100
        fsGroup: 101
      # init container runs database migrations before the http server starts
      # this satisfies the "initContainer or job" requirement
      initContainers:
      - name: migrate
        # reuses the same image as the main container; only the command differs
        image: ghcr.io/zofiadobrowolskaa/aura-pg-service:latest
        # npm run migrate executes prisma migrate deploy + knex migrate:latest + knex seed:run
        command: ["npm", "run", "migrate"]
        env:
        # full connection string lives in the secret because it contains the password
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: aura-secret
              key: DATABASE_URL
      containers:
      - name: pg-service
        image: ghcr.io/zofiadobrowolskaa/aura-pg-service:latest
        # use the k8s-only start command so the migration logic does not run a second time
        command: ["npm", "run", "start:k8s"]
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: aura-secret
              key: DATABASE_URL
        # readiness probe: pod gets traffic only when /ready returns 200 (db reachable)
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
        # liveness probe: kubelet restarts the container if /health stops responding
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 20
          periodSeconds: 10
        # explicit cpu/memory requests and limits
        resources:
          requests:
            cpu: "100m"
            memory: "200Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # container-level hardening
        securityContext:
          allowPrivilegeEscalation: false
          # prisma writes engine binaries to node_modules at runtime, so we cannot
          # use a fully read-only root filesystem here
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
