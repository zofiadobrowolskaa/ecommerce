# api-gateway is the public-facing backend reached via the ingress
# it is the "backend" referenced by the rolling-update and PDB requirements
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: aura
spec:
  # 2 replicas: minimum for highly-available rolling updates and PDB
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      # prometheus discovery annotations
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        # uid 100 matches the "app" user from the api-gateway Dockerfile
        runAsUser: 100
        fsGroup: 101
      containers:
      - name: api-gateway
        image: ghcr.io/zofiadobrowolskaa/aura-api-gateway:latest
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        # service-to-service urls from the configmap (non-sensitive)
        - name: INVENTORY_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: aura-config
              key: INVENTORY_SERVICE_URL
        - name: CATALOG_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: aura-config
              key: CATALOG_SERVICE_URL
        # redis cache target
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: aura-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: aura-config
              key: REDIS_PORT
        # readiness probe: /ready pings both downstream services and returns 503 on failure
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        # liveness probe: process alive check
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "200Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
