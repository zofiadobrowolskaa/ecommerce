# non-privileged nginx must listen above port 1024; 8080 is the image default
server {
    listen 8080;
    server_name _;

    # static spa files baked into the image during build
    root /usr/share/nginx/html;
    index index.html;

    # serve hashed static assets directly; fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # plain-text health endpoint used by the kubernetes liveness probe
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
