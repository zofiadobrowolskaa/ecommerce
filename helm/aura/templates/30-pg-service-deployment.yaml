# pg-service deployment; replicas, image and resources parameterized for per-env tuning
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-service
  namespace: {{ .Values.namespace }}
spec:
  # replicas come from values.pgService.replicas (2 dev, 3 prod)
  replicas: {{ .Values.pgService.replicas }}
  # rolling update: replace pods one by one to avoid downtime during an upgrade.
  # maxSurge=1: kubernetes can run 1 extra pod above the desired count while rolling.
  # maxUnavailable=0: never drop below the desired count, so traffic always has a healthy pod.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pg-service
  template:
    metadata:
      labels:
        app: pg-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        fsGroup: 101
      initContainers:
      - name: migrate
        # image reference built by the aura.image helper from values.image.{registry,tag}
        image: {{ include "aura.image" (dict "service" "pg-service" "root" .) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["npm", "run", "migrate"]
        env:
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: aura-secret, key: DATABASE_URL } }
      containers:
      - name: pg-service
        image: {{ include "aura.image" (dict "service" "pg-service" "root" .) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["npm", "run", "start:k8s"]
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: aura-secret, key: DATABASE_URL } }
        # readiness: when /ready returns non-200, kubernetes pulls the pod out of the
        # service load balancer (but does NOT restart it). /ready runs `SELECT 1` on postgres.
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
        # liveness: when /health stops responding, kubelet restarts the container.
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 20
          periodSeconds: 10
        # requests = guaranteed minimum reservation; limits = hard cap (cpu throttle / oom-kill).
        # values merged from values.pgService.resources (dev vs prod sizing).
        resources:
          {{- toYaml .Values.pgService.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
