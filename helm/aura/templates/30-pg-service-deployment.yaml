# pg-service deployment; replicas, image and resources parameterized for per-env tuning
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-service
  namespace: {{ .Values.namespace }}
spec:
  # replicas come from values.pgService.replicas (2 dev, 3 prod)
  replicas: {{ .Values.pgService.replicas }}
  # rolling update: replace pods one by one to avoid downtime during an upgrade.
  # maxSurge=1: kubernetes can run 1 extra pod above the desired count while rolling.
  # maxUnavailable=0: never drop below the desired count, so traffic always has a healthy pod.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pg-service
  template:
    metadata:
      labels:
        app: pg-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      # pod-level security context: drop root for every container in this pod.
      # uid 100 matches the "app" user we create in the pg-service Dockerfile.
      # fsGroup 101 makes mounted volumes writable by that user.
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        fsGroup: 101
      # init container runs db migrations BEFORE the http server starts.
      # if `npm run migrate` fails, the main container never boots — clean dependency order.
      # this satisfies the "use an initContainer or Job" half of W7.
      initContainers:
      - name: migrate
        # reuses the pg-service image; only the command differs from the main container
        image: {{ include "aura.image" (dict "service" "pg-service" "root" .) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        # runs prisma migrate deploy + knex migrate:latest + knex seed:run
        command: ["npm", "run", "migrate"]
        env:
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: aura-secret, key: DATABASE_URL } }
      containers:
      - name: pg-service
        image: {{ include "aura.image" (dict "service" "pg-service" "root" .) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["npm", "run", "start:k8s"]
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: aura-secret, key: DATABASE_URL } }
        # readiness: when /ready returns non-200, kubernetes pulls the pod out of the
        # service load balancer (but does NOT restart it). /ready runs `SELECT 1` on postgres.
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
        # liveness: when /health stops responding, kubelet restarts the container.
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 20
          periodSeconds: 10
        # requests = guaranteed minimum reservation; limits = hard cap (cpu throttle / oom-kill).
        # values merged from values.pgService.resources (dev vs prod sizing).
        resources:
          {{- toYaml .Values.pgService.resources | nindent 10 }}
        # container-level hardening on top of the pod-level non-root context:
        # - allowPrivilegeEscalation: blocks setuid / sudo from elevating to root
        # - capabilities drop ALL: removes every linux kernel capability (none needed for express)
        # - readOnlyRootFilesystem false: prisma writes engine binaries to node_modules at runtime
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
