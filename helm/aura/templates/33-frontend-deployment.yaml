# frontend deployment; nginx-unprivileged image, replicas tunable per env
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  # rolling update: replace pods one by one to avoid downtime during an upgrade.
  # maxSurge=1: kubernetes can run 1 extra pod above the desired count while rolling.
  # maxUnavailable=0: never drop below the desired count, so traffic always has a healthy pod.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # pod-level security context: drop root for the nginx worker.
      # uid 101 is the nginx user baked into the nginxinc/nginx-unprivileged image.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
      - name: frontend
        image: {{ include "aura.image" (dict "service" "frontend" "root" .) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
        # readiness/liveness: both hit the static /health endpoint that nginx serves
        # from the config file. cheap and reliable for a stateless static-content server.
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        # requests = guaranteed minimum reservation; limits = hard cap (cpu throttle / oom-kill).
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        # container-level hardening: no setuid escape, no linux capabilities.
        # readOnlyRootFilesystem stays false because nginx writes pid/cache files to /tmp.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
