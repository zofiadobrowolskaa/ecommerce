# mongodb statefulset, storage size parameterized for per-env tuning
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: {{ .Values.namespace }}
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: mongodb
        image: mongo:6
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom: { configMapKeyRef: { name: aura-config, key: MONGO_INITDB_ROOT_USERNAME } }
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom: { secretKeyRef: { name: aura-secret, key: MONGO_PASSWORD } }
        # tcpSocket probes used because the mongosh exec probe regularly hits
        # the 5s timeout on resource-constrained nodes (mongosh has a heavy
        # node.js startup). mongo opens the listening port only once it is ready
        # to accept commands, so an open tcp socket is a reliable readiness signal.
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: data
          mountPath: /data/db
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          # storage size from values (1Gi dev, 5Gi prod)
          storage: {{ .Values.mongodb.storage }}
