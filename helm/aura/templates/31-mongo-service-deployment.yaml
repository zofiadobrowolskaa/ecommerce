# mongo-service deployment; same parameterization pattern as pg-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.mongoService.replicas }}
  # rolling update: replace pods one by one to avoid downtime during an upgrade.
  # maxSurge=1: kubernetes can run 1 extra pod above the desired count while rolling.
  # maxUnavailable=0: never drop below the desired count, so traffic always has a healthy pod.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mongo-service
  template:
    metadata:
      labels:
        app: mongo-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        fsGroup: 101
      containers:
      - name: mongo-service
        image: {{ include "aura.image" (dict "service" "mongo-service" "root" .) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: "3002"
        - name: MONGO_URI
          valueFrom: { secretKeyRef: { name: aura-secret, key: MONGO_URI } }
        readinessProbe:
          httpGet:
            path: /ready
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 20
          periodSeconds: 10
        resources:
          {{- toYaml .Values.mongoService.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
