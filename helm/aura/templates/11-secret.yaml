# dev placeholder secret; production releases override these values via
# `helm install ... --set-string postgresPassword=... --set-string mongoPassword=...`
# or via an external secret manager (sealed-secrets, external-secrets-operator, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: aura-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  # postgres credentials consumed by the postgres statefulset and pg-service
  POSTGRES_PASSWORD: "dev_password_change_me"

  # mongo root password consumed by the mongo statefulset and mongo-service
  MONGO_PASSWORD: "dev_password_change_me"

  # full database urls; kept in the secret because they contain passwords
  DATABASE_URL: "postgresql://user:dev_password_change_me@postgres-0.postgres:5432/ecommerce_db"
  MONGO_URI: "mongodb://admin:dev_password_change_me@mongodb-0.mongodb:27017/ecommerce_db?authSource=admin"
